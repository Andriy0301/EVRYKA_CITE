<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформлення замовлення - EVRYKA</title>
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css?v=20260424">
</head>
<body>


  <header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo header-logo">
      <img src="images/text_logo.png" alt="EVRYKA" class="header-logo-img">
    </a>

    <nav class="nav header-nav" aria-label="Головна навігація">
      <a href="index.html">Головна</a>
      <a href="catalog.html">Каталог</a>
      <a href="#">Замовити 3D друк</a>
      <a href="#">Контакти</a>
    </nav>
    <div class="header-utilities">
      <div class="search-box">
        <input type="text" placeholder="Пошук товарів..." id="search" autocomplete="off">
        <div id="searchResults" class="search-results"></div>
      </div>
      <div class="header-actions">
        <button type="button" id="authBtn" class="auth-icon-btn" title="Особистий кабінет">
          <svg id="authIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12c2.8 0 5-2.2 5-5s-2.2-5-5-5-5 2.2-5 5 2.2 5 5 5Zm0 2c-4.4 0-8 2.7-8 6v2h16v-2c0-3.3-3.6-6-8-6Z"></path>
          </svg>
          <span id="authInitials" class="auth-initials"></span>
        </button>
        <button type="button" id="favoritesBtn" class="auth-icon-btn" title="Обрані" onclick="toggleFavorites(true)">
          <svg class="heart-icon" viewBox="0 0 512 512" aria-hidden="true">
            <path d="M257 88L255 88C248.355 74.9828 235.475 63.8415 224 55.1304C173.114 16.5016 99.2988 19.267 51 61.2894C-1.26738 106.765 -12.8083 185.773 13.0116 248C25.4527 277.984 45.9981 303.467 67.9105 327C103.494 365.215 144.281 398.581 184 432.421C198.063 444.402 211.938 456.598 226 468.579C233.971 475.37 241.993 483.022 253 483.907C268.121 485.122 278.342 475.197 289 466C306.641 450.778 324.263 435.533 342 420.421C356.437 408.121 370.854 395.797 385 383.166C443.359 331.055 512 269.827 512 185C512 178.072 512.538 170.886 511.715 164C506.476 120.199 486.854 78.636 450 52.7207C401.715 18.7669 334.983 19.4645 288 55.1304C276.525 63.8415 263.645 74.9828 257 88z"></path>
          </svg>
        </button>
        <div class="cart" onclick="toggleCart(true)">
          <img src="images/cart-icon.svg" class="cart-icon" alt="Кошик">
          <span id="cartCount">0</span>
        </div>
      </div>
    </div>
  </div>
</header>

  <div id="cartOverlay" class="cart-overlay" onclick="toggleCart(false)"></div>
  <div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
      <h3>Кошик</h3>
      <button class="close-btn" onclick="toggleCart(false)">✖</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Разом</span>
        <div><b id="cartTotal">0</b><span>грн</span></div>
      </div>
      <button class="checkout-btn" onclick="checkout()">Оформити</button>
      <button class="clear-btn" onclick="clearCart()">Очистити кошик</button>
    </div>
  </div>

  <div id="favoritesOverlay" class="cart-overlay" onclick="toggleFavorites(false)"></div>
  <div id="favoritesSidebar" class="cart-sidebar">
    <div class="cart-header">
      <h3>Обрані товари</h3>
      <button class="close-btn" onclick="toggleFavorites(false)">✖</button>
    </div>
    <div id="favoritesItems" class="cart-items"></div>
    <div class="cart-footer">
      <button class="clear-btn" onclick="clearFavorites()">Очистити обрані</button>
    </div>
  </div>


  <main class="container order-layout">
    <section class="products cabinet-card order-items-card">
      <h2>Ваше замовлення</h2>
      <div id="orderItems"></div>
      <div class="cart-total order-total-row">
        <span>Разом</span>
        <div><b id="orderTotal">0</b><span>грн</span></div>
      </div>
    </section>

    <section class="products cabinet-card">
      <h2>Дані для замовлення</h2>
      <form id="orderForm" class="cabinet-form">
        <label>Ім'я<input id="orderName" type="text" required></label>
        <label>Прізвище<input id="orderLastName" type="text" required></label>
        <label>Телефон<input id="orderPhone" type="tel" required></label>
        <label>Email<input id="orderEmail" type="email" required></label>

        <h3>Доставка</h3>
        <label>Спосіб оплати
          <select id="orderPaymentMethod" required>
            <option value="cod">Оплата при отриманні</option>
            <option value="liqpay">Оплата LiqPay</option>
          </select>
        </label>
        <label>Служба доставки
          <select id="orderProvider" required>
            <option value="">Оберіть службу доставки</option>
            <option value="nova_poshta">Нова пошта</option>
            <option value="ukr_poshta">Укрпошта</option>
          </select>
        </label>

        <label id="deliveryTypeWrap">Тип доставки
          <select id="orderDeliveryType">
            <option value="warehouse">Відділення</option>
            <option value="postomat">Поштомат</option>
            <option value="address">Адресна доставка</option>
          </select>
        </label>

        <label id="cityWrap" class="city-autocomplete-wrap">Обрати місто
          <input id="orderCity" type="text" autocomplete="off">
          <div id="citySuggestions" class="city-suggestions" style="display:none;"></div>
        </label>
        <input id="orderCityRef" type="hidden">

        <label id="branchWrap" class="city-autocomplete-wrap">Обрати відділення
          <input id="orderBranch" type="text" autocomplete="off" placeholder="Почніть вводити відділення...">
          <div id="branchSuggestions" class="city-suggestions" style="display:none;"></div>
        </label>
        <input id="orderBranchRef" type="hidden">

        <label id="addressWrap" style="display:none;">Адреса доставки
          <input id="orderAddress" type="text" placeholder="Вулиця, будинок, квартира">
        </label>
        <label id="middleNameWrap" style="display:none;">По батькові
          <input id="orderMiddleName" type="text" placeholder="По батькові">
        </label>
        <p id="orderMessage" class="auth-message"></p>
        <div class="cabinet-actions-row">
          <button class="checkout-btn" type="submit">Підтвердити замовлення</button>
        </div>
      </form>
    </section>
  </main>

  <div id="orderSuccessModal" class="auth-modal" style="display:none;">
    <div class="auth-modal-content order-success-content">
      <button class="close-btn order-success-close" type="button" onclick="closeOrderSuccessModal()">✖</button>
      <div class="order-success-header">
        <span class="order-success-check" aria-hidden="true">✓</span>
        <div class="order-success-title-wrap">
          <h3>Ваше замовлення успішно оформлене</h3>
          <p class="order-success-subtitle">Дякуємо за покупку! Деталі замовлення нижче.</p>
        </div>
      </div>
      <p id="orderSuccessNumber" class="order-success-number"></p>
      <div id="orderSuccessDetails" class="order-success-details"></div>
      <div class="cabinet-actions-row order-success-actions">
        <button type="button" class="checkout-btn" onclick="closeOrderSuccessModal()">Закрити</button>
      </div>
    </div>
  </div>

  <div id="chatWidgetRoot" class="chat-widget-root">
    <button type="button" id="chatWidgetToggle" class="chat-widget-toggle" aria-expanded="false" aria-controls="chatWidgetPanel" title="Написати нам">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"></path>
      </svg>
    </button>
    <div id="chatWidgetPanel" class="chat-widget-panel" role="dialog" aria-modal="true" aria-labelledby="chatWidgetTitle" aria-hidden="true">
      <div class="chat-widget-head">
        <span id="chatWidgetTitle">Напишіть нам</span>
        <button type="button" class="chat-widget-close" aria-label="Закрити чат">×</button>
      </div>
      <div class="chat-widget-body">
        <div id="chatWidgetMessages" class="chat-widget-messages" aria-live="polite"></div>
        <div class="chat-widget-compose">
          <input type="text" id="chatWidgetText" class="chat-widget-field" placeholder="Ваше запитання…" maxlength="2000" autocomplete="off">
          <button type="button" id="chatWidgetSend" class="chat-widget-send">Надіслати</button>
        </div>
        <p id="chatWidgetStatus" class="chat-widget-status" role="status"></p>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=20260424"></script>
  <script src="js/order.js?v=20260424"></script>
  <script src="js/cart.js?v=20260430"></script>
  <script src="js/app.js?v=20260426"></script>
  <script src="js/chat-widget.js?v=20260502"></script>
</body>
</html>
